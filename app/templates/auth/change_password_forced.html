{% extends "base_auth.html" %}
{% block title %}Cambiar password{% endblock %}
{% block content %}
<h2>Cambiar <span class="accent">password</span></h2>

<div class="info-banner">
    <strong>Primera vez en Laggeros.</strong>
    Elegi una password nueva antes de seguir. La anterior fue una temporal que te paso el admin.
</div>

<form method="post" autocomplete="off">
    <label>Password actual
        <input type="password" name="current_password" required autocomplete="current-password" autofocus>
    </label>
    <label>Password nueva <span class="hint">(min 6 caracteres)</span>
        <input type="password" name="new_password" required minlength="6" autocomplete="new-password">
    </label>
    <label>Confirmar password nueva
        <input type="password" name="confirm_password" required minlength="6" autocomplete="new-password">
    </label>
    <button type="submit">Guardar password</button>
</form>
{% endblock %}
