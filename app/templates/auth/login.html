{% extends "base_auth.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<h2>Iniciar <span class="accent">sesion</span></h2>
<form method="post">
    <label>Nickname
        <input type="text" name="nickname" required autofocus autocomplete="username">
    </label>
    <label>Password
        <input type="password" name="password" required autocomplete="current-password">
    </label>
    <button type="submit">Entrar</button>
</form>
<div style="margin-top: 1rem; text-align: center; font-size: 0.85rem; color: var(--text-secondary);">
    No sos capo? <a href="{{ url_for('auth.register') }}" style="color: var(--accent);">Pedi acceso como observer</a>.
</div>
{% endblock %}
