{% extends "base_auth.html" %}
{% block title %}Cambiar password{% endblock %}
{% block content %}
<h2>Cambiar <span class="accent">password</span></h2>
{% if forced %}
<p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 0;">
    Es la primera vez que entras. Cambia la password antes de seguir.
</p>
{% endif %}
<form method="post">
    <label>Password actual
        <input type="password" name="current_password" required autocomplete="current-password">
    </label>
    <label>Password nueva (min 6 caracteres)
        <input type="password" name="new_password" required minlength="6" autocomplete="new-password">
    </label>
    <label>Confirmar nueva
        <input type="password" name="confirm_password" required minlength="6" autocomplete="new-password">
    </label>
    <button type="submit">Guardar</button>
</form>
{% endblock %}
