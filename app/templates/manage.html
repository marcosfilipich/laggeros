{% extends "base.html" %}
{% block title %}Players{% endblock %}
{% block content %}
<div class="section">
    <div class="section-header">
        <h2>Agregar <span class="accent">player</span></h2>
        <span class="section-meta">{{ players|length }} en total</span>
    </div>
    <form method="post" class="form-body">
        <label>Nombre <input type="text" name="name" required maxlength="80"></label>
        <button type="submit">Agregar player</button>
    </form>
    <ul class="simple-list">
        {% for p in players %}<li>{{ p.name }}</li>{% else %}<li class="empty-state" style="padding: 0.85rem;">Ningun player todavia</li>{% endfor %}
    </ul>
</div>
{% endblock %}
