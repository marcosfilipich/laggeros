{% extends "base.html" %}
{% block title %}Reportar lag{% endblock %}
{% block content %}
<section class="card">
    <h2>Reportar lag</h2>
    {% if not players or not games %}
        <p>Necesitas <a href="{{ url_for('main.manage') }}">agregar al menos un player y un juego</a> antes de reportar.</p>
    {% else %}
    <form method="post">
        <label>Player
            <select name="player_id" required>
                <option value="">Elegi un player</option>
                {% for p in players %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
            </select>
        </label>
        <label>Juego
            <select name="game_id" required>
                <option value="">Elegi un juego</option>
                {% for g in games %}<option value="{{ g.id }}">{{ g.name }}</option>{% endfor %}
            </select>
        </label>
        <label>Lag (ms)
            <input type="number" name="lag_ms" min="0" max="100000" required>
        </label>
        <label>Nota (opcional)
            <input type="text" name="note" maxlength="255" placeholder="ej: lag terrible en el final">
        </label>
        <button type="submit">Guardar reporte</button>
    </form>
    {% endif %}
</section>
{% endblock %}
