{% extends "base.html" %}
{% block title %}Reportar lag{% endblock %}
{% block content %}
<div class="section">
    <div class="section-header">
        <h2>Reportar <span class="accent">lag</span></h2>
    </div>
    {% if not players %}
        <div class="empty-state">
            Necesitas <a href="{{ url_for('main.manage') }}">agregar al menos un player</a> antes de reportar.
        </div>
    {% else %}
    <form method="post" class="form-body">
        <label>Player
            <select name="player_id" required>
                <option value="">Elegi un player</option>
                {% for p in players %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
            </select>
        </label>
        <label>Lag (ms)
            <input type="number" name="lag_ms" min="0" max="100000" required>
        </label>
        <label>Nota (opcional)
            <input type="text" name="note" maxlength="255" placeholder="ej: lag terrible en el final">
        </label>
        <button type="submit">Guardar reporte</button>
    </form>
    {% endif %}
</div>
{% endblock %}
