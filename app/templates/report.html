{% extends "base.html" %}
{% block title %}Sumar puntos{% endblock %}
{% block content %}
<div class="section">
    <div class="section-header">
        <h2>Sumar <span class="accent">puntos</span></h2>
    </div>
    {% if not players %}
        <div class="empty-state">
            Necesitas <a href="{{ url_for('main.manage') }}">agregar al menos un player</a> antes de sumar puntos.
        </div>
    {% else %}
    <form method="post" class="form-body">
        <label>Player
            <select name="player_id" required>
                <option value="">Elegi un player</option>
                {% for p in players %}<option value="{{ p.id }}">{{ p.nickname }}{% if p.nombre_real %} ({{ p.nombre_real }}){% endif %}</option>{% endfor %}
            </select>
        </label>
        <label>Puntos
            <input type="number" name="points" required>
        </label>
        <button type="submit">Guardar</button>
    </form>
    {% endif %}
</div>
{% endblock %}
